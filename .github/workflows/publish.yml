name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

      - name: Check tag version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          init_text = pathlib.Path("src/agent_can/__init__.py").read_text()
          match = re.search(r'^__version__ = "([^"]+)"$', init_text, re.MULTILINE)
          init_version = match.group(1) if match else None
          expected = f"v{version}"
          if tag != expected or init_version != version:
              raise SystemExit(
                  f"version mismatch: tag={tag} pyproject={version} __version__={init_version}"
              )
          PY

      - name: Build package
        run: uv build --no-sources

      - name: Publish package
        run: uv publish
