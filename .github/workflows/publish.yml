name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          init_text = pathlib.Path("src/agent_can/__init__.py").read_text()
          match = re.search(r'^__version__ = "([^"]+)"$', init_text, re.MULTILINE)
          init_version = match.group(1) if match else None
          expected = f"v{version}"
          if tag != expected or init_version != version:
              raise SystemExit(
                  f"version mismatch: tag={tag} pyproject={version} __version__={init_version}"
              )
          PY
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}^{commit}")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "release tag ${RELEASE_TAG} is not reachable from origin/main"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

      - name: Build package
        run: uv build --no-sources

      - name: Publish package
        run: uv publish
